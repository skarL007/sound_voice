name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest + TypeScript (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend test dependencies
        run: pip install fastapi "httpx<0.28" pytest psutil numpy soundfile sounddevice requests

      - name: Run Python API tests
        run: python -m pytest src/python/tests src/python/test_security_validators.py -q

      - name: Build (no installer)
        run: npm run build

      # Electron E2E uses the app's own Electron binary (installed by npm ci),
      # so no Playwright browser download is needed. Quote @online — under pwsh
      # a bare @online is parsed as a splat and reaches Playwright empty.
      - name: Run E2E tests (Electron, offline)
        run: npx playwright test --grep-invert '@online'
