name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build instalador e publicar release
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Backend Python compilado no proprio job (autossuficiente) — sem depender
      # de artefato externo. Usa o mesmo script validado localmente (venv isolado).
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build backend Python (PyInstaller)
        run: scripts\build-python-venv.bat
        shell: cmd

      - name: Rodar testes
        run: npm test

      - name: Build Electron
        run: npm run build

      - name: Baixar VB-Cable (microfone virtual embutido)
        shell: pwsh
        run: ./scripts/fetch-vbcable.ps1

      - name: Build instalador Windows
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Descomente quando tiver certificado de assinatura:
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artefato do instalador
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          retention-days: 30

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoiceLaunch TTS ${{ github.ref_name }}
          body_path: .github/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
